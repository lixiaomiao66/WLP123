<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纸青蛙展示台</title>
    <style>
        /* 全局重置与基础样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh;
            /* 使用深色渐变背景，让液态玻璃效果更明显 */
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 核心：液态玻璃效果 (直角硬派风格) */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            border-radius: 0 !important; /* 强制所有元素直角 */
        }

        /* 登录页面样式 */
        #loginPage {
            width: 380px; padding: 40px; text-align: center;
        }
        #loginPage h2 { color: #fff; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: rgba(255,255,255,0.7); margin-bottom: 8px; font-size: 14px; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: #fff; outline: none;
            border-radius: 0 !important; /* 输入框也保持直角 */
        }
        .input-group input:focus { border-color: rgba(255,255,255,0.5); }
        button {
            width: 100%; padding: 14px; border: none; cursor: pointer;
            background: rgba(255,255,255,0.2); color: #fff; font-size: 16px;
            transition: background 0.3s; border-radius: 0 !important; /* 按钮直角 */
        }
        button:hover { background: rgba(255,255,255,0.3); }

        /* 商品展示页面样式 */
        #shopPage {
            display: none; /* 默认隐藏 */
            width: 90%; max-width: 1000px; padding: 40px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { color: #fff; font-weight: 300; }
        .logout-btn { width: auto; padding: 8px 20px; font-size: 14px; }
 
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { padding: 30px; transition: transform 0.3s; border-radius: 0 !important; }
        .card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.12); }
        .card h3 { color: #fff; font-size: 20px; margin-bottom: 10px; }
        .card .code { color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 15px; font-family: monospace; }
        .card .price { color: #a8dadc; font-size: 15px; line-height: 1.6; }
    </style>
</head>
<body>

    <!-- 登录页面 -->
    <div id="loginPage" class="glass">
        <h2>系统登录</h2>
        <div class="input-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="随便填">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button onclick="handleLogin()">登 录</button>
    </div>

    <!-- 商品展示页面 -->
    <div id="shopPage" class="glass">
        <div class="header">
            <h1>纸青蛙商品列表</h1>
            <button class="logout-btn" onclick="handleLogout()">退出登录</button>
        </div>
        <div class="grid">
            <!-- 商品 1 -->
            <div class="card glass">
                <h3>白巧纸青蛙</h3>
                <div class="code">低价码: 3068</div>
                <div class="price">价格：一张 A4 纸，4 个青蛙</div>
            </div>
            <!-- 商品 2 -->
            <div class="card glass">
                <h3>Colorful 纸青蛙</h3>
                <div class="code">: 低价码0360</div>
                <div class="price">价格：一张彩色 A4 纸，4 个纸青蛙</div>
            </div>
            <!-- 商品 3 -->
            <div class="card glass">
                <h3>Colorful very Pro. 纸青蛙</h3>
                <div class="code">低价码: Pro306306</div>
                <div class="price">价格：一张 A4 纸，3 个青蛙</div>
            </div>
            <!-- 商品 4 -->
            <div class="card glass">
                <h3>Colorful very 纸青蛙</h3>
                <div class="code">低价码: 无</div>
                <div class="price">价格：一张 A4 纸，3 个纸青蛙</div>
            </div>
        </div>
    </div>

    <script>
        const correctPassword = "3061999";

        function handleLogin() {
            const pwd = document.getElementById('password').value;
            if (pwd === correctPassword) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('shopPage').style.display = 'block';
            } else {
                alert("密码错误，请重新输入！");
            }
        }

        function handleLogout() {
            document.getElementById('shopPage').style.display = 'none';
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
